name: CI

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  python39-compatibility:
    name: Python 3.9 syntax and import check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install .
          python -m pip install pytest pytest-timeout

      - name: Compile sources
        run: python -m compileall -q mblt_tracker tests

      - name: Import package
        run: python -c "import mblt_tracker"

      - name: Run tests
        run: python -m pytest
